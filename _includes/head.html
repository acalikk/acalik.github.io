<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }} | {{ site.title }}</title>

  <style>
    :root { --border:#e6e6e6; --muted:#666; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; line-height:1.55; }
    a { text-decoration: none; }
    a:hover { text-decoration: underline; }

    .nav a { margin-right: 12px; }
    .muted { color: var(--muted); }

    .chip {
      display:inline-block; padding:6px 10px; border:1px solid var(--border);
      border-radius: 999px; margin: 4px 6px 4px 0; font-size: 14px; cursor: pointer;
      background: white;
    }
    .chip[aria-pressed="true"] { font-weight: 600; }

    .card {
      border:1px solid var(--border); border-radius: 14px; padding: 16px; margin: 14px 0;
    }
    .card h3 { margin: 0 0 6px 0; }
    .meta { font-size: 14px; color: var(--muted); margin-top: 6px; }
    .tags { margin-top: 10px; }
    .tag { font-size: 12px; color: var(--muted); border:1px solid var(--border); border-radius: 999px; padding: 3px 8px; display:inline-block; margin-right: 6px; margin-top: 6px; }
    .row { display:flex; align-items:center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .search { padding:10px 12px; border:1px solid var(--border); border-radius: 10px; min-width: 240px; }
    .hidden { display:none !important; }
  </style>
</head>
