title: Aybüke Çalık Yüksel
description: Bioelectronics • Neuroengineering • Hardware + testing mindset

# Minimal Mistakes
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "dark"

atom_feed:
  hide: true

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

# Build settings
markdown: kramdown
permalink: /:categories/:title/

# Your Projects collection (from _projects/)
collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: false
      classes: wide

  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: false
      classes: wide

footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/aybuke-calik/"
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:aybuke_calik@hotmail.com"
